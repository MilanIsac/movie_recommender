services:
  fastapi:
    build: ./recommendation
    container_name: fastapi
    ports:
      - "8000:8000"
    env_file:
      - ./recommendation/.env

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - fastapi

  frontend:
    build:
      context: ./client/movie-frontend
      dockerfile: Dockerfile
    container_name: client
    ports:
      - "5173:5173"
    depends_on:
      - backend